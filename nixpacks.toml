# Railway: Vite + Tailwind + PostCSS теперь в dependencies — сборка проходит и при `npm ci` с NODE_ENV=production.
# (Раньше здесь был `npm ci --include=dev`, если Railpack/Nixpacks не подхватывал конфиг — падало с «vite: command not found».)
[phases.install]
cmds = ["npm ci --prefer-offline --no-audit"]

[phases.build]
cmds = ["npm run build"]
