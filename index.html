<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com; font-src https://fonts.gstatic.com; connect-src 'self' https: wss:; img-src 'self' data: https:; frame-src 'self' https://www.youtube-nocookie.com https://www.youtube.com https://www.google.com https://accounts.google.com; base-uri 'self'; form-action 'self';" />
    <title>Kiddy | IT-Школа будущего</title>
    <meta name="description" content="Kiddy — премиальная IT-школа для детей" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" crossorigin />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              kiddy: {
                base: '#0a0a0a',
                surface: '#0f0f0f',
                surfaceElevated: '#141414',
                surfaceHighlight: '#1a1a1a',
                surfaceDark: '#121212',
                border: 'rgba(255,255,255,0.05)',
                borderStrong: 'rgba(255,255,255,0.08)',
                cherry: '#e6002b',
                cherryHover: '#ff1a45',
                cherryGlow: 'rgba(230,0,43,0.35)',
                cherryDim: 'rgba(230,0,43,0.12)',
                primary: '#e6002b',
                text: '#ffffff',
                textSecondary: '#a1a1aa',
                textMuted: '#52525b',
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              display: ['Inter', 'system-ui', 'sans-serif'],
            },
            fontSize: {
              'display-xl': ['4rem', { lineHeight: '1.05', letterSpacing: '-0.04em', fontWeight: '800' }],
              'display-lg': ['3rem', { lineHeight: '1.1', letterSpacing: '-0.03em', fontWeight: '800' }],
              'display-md': ['2rem', { lineHeight: '1.15', letterSpacing: '-0.02em', fontWeight: '700' }],
              'body-lg': ['1.125rem', { lineHeight: '1.6', fontWeight: '500' }],
              'body': ['1rem', { lineHeight: '1.6', fontWeight: '400' }],
              'body-sm': ['0.875rem', { lineHeight: '1.6', fontWeight: '400' }],
              'caption': ['0.75rem', { lineHeight: '1.5', fontWeight: '500', letterSpacing: '0.01em' }],
            },
            boxShadow: {
              'depth': '0 8px 32px -8px rgba(0,0,0,0.8), 0 1px 0 0 rgba(255,255,255,0.04) inset',
              'cherry-glow': '0 0 32px -8px rgba(230,0,43,0.4)',
            },
            transitionTimingFunction: {
              'entrance': 'cubic-bezier(0.16, 1, 0.3, 1)',
              'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.1)',
              'smooth': 'cubic-bezier(0.25, 0.1, 0.25, 1)',
            },
            keyframes: {
              'fade-in': { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              'reveal-up': { 
                '0%': { opacity: '0', transform: 'translateY(24px) scale(0.98)', filter: 'blur(4px)' }, 
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)', filter: 'blur(0)' } 
              },
              'scale-in': { 
                '0%': { opacity: '0', transform: 'scale(0.95)' }, 
                '100%': { opacity: '1', transform: 'scale(1)' } 
              },
              'shimmer': { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
              'draw-svg': { 'to': { strokeDashoffset: '0' } }
            },
            animation: {
              'fade-in': 'fade-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'reveal-up': 'reveal-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'scale-in': 'scale-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'shimmer': 'shimmer 2.5s ease-in-out infinite',
              'draw-svg': 'draw-svg 2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            },
          }
        }
      };
    </script>
    <style>
      :root {
        --kiddy-cherry: #e6002b;
        --kiddy-bg: #0a0a0a;
        --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.1);
        --ease-entrance: cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      * { box-sizing: border-box; }
      html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      
      body {
        margin: 0;
        background-color: var(--kiddy-bg);
        background-image: 
          radial-gradient(circle at 50% 0%, rgba(230,0,43,0.04) 0%, transparent 45%),
          radial-gradient(circle at 100% 100%, rgba(255,255,255,0.02) 0%, transparent 50%);
        background-attachment: fixed;
        color: #ffffff;
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100vh;
      }

      /* Scrollbar */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #262626; }

      /* CTA Button - Tactile, glowing */
      .btn-cta {
        position: relative;
        background-color: var(--kiddy-cherry);
        color: #ffffff;
        border-radius: 9999px;
        font-weight: 700;
        letter-spacing: 0.02em;
        transition: transform 0.3s var(--ease-spring), background-color 0.3s ease, box-shadow 0.3s ease;
        overflow: hidden;
      }
      .btn-cta::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: inherit;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
        pointer-events: none;
      }
      .btn-cta:hover {
        transform: scale(1.02) translateY(-1px);
        background-color: #ff1a45;
        box-shadow: 0 8px 24px -6px rgba(230,0,43,0.4);
      }
      .btn-cta:active { 
        transform: scale(0.96); 
        box-shadow: 0 2px 8px -2px rgba(230,0,43,0.4);
      }

      /* Secondary Button */
      .btn-secondary {
        background-color: rgba(255,255,255,0.04);
        color: #ffffff;
        border: 1px solid rgba(255,255,255,0.04);
        border-radius: 9999px;
        font-weight: 600;
        transition: transform 0.3s var(--ease-spring), background-color 0.3s ease, border-color 0.3s ease;
      }
      .btn-secondary:hover {
        background-color: rgba(255,255,255,0.08);
        border-color: rgba(255,255,255,0.1);
        transform: scale(1.02);
      }
      .btn-secondary:active { transform: scale(0.96); }

      /* Cards - Matte black, cherry accent on hover */
      .card-premium {
        background-color: rgba(15, 15, 15, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 16px;
        box-shadow: 0 8px 32px -8px rgba(0,0,0,0.6);
        transition: transform 0.4s var(--ease-entrance), background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      }
      .card-premium:hover { 
        background-color: rgba(20, 20, 20, 0.95);
        border-color: rgba(255,255,255,0.08);
        box-shadow: 0 16px 48px -12px rgba(0,0,0,0.8), 0 0 0 1px rgba(230,0,43,0.06);
        transform: translateY(-4px);
      }

      /* Inputs - Animated Focus */
      .input-premium {
        background-color: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 12px;
        color: #ffffff;
        transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      }
      .input-premium:hover {
        background-color: rgba(255,255,255,0.05);
      }
      .input-premium:focus {
        outline: none;
        background-color: rgba(255,255,255,0.05);
        border-color: var(--kiddy-cherry);
        box-shadow: 0 0 0 4px rgba(230,0,43,0.1);
      }

      /* Nav Active - Smooth Text */
      .nav-active {
        background-color: rgba(255,255,255,0.04);
        color: #ffffff !important;
      }

      /* SVG Animations */
      .svg-line {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: draw-svg 1.5s var(--ease-entrance) forwards;
      }
      
      @keyframes draw-svg {
        to { stroke-dashoffset: 0; }
      }

      /* Skeleton */
      .skeleton {
        background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 100%);
        background-size: 200% 100%;
        animation: shimmer 2s infinite linear;
        border-radius: 8px;
      }

      /* Stagger: only transform (no opacity) so content is always visible even if animation fails */
      @keyframes reveal-up {
        0% { transform: translateY(20px) scale(0.99); }
        100% { transform: translateY(0) scale(1); }
      }
      @keyframes scale-in {
        0% { transform: scale(0.98); }
        100% { transform: scale(1); }
      }
      .stagger-1 { animation: reveal-up 0.5s var(--ease-entrance) both; animation-delay: 0.05s; }
      .stagger-2 { animation: reveal-up 0.5s var(--ease-entrance) both; animation-delay: 0.1s; }
      .stagger-3 { animation: reveal-up 0.5s var(--ease-entrance) both; animation-delay: 0.15s; }
      .stagger-4 { animation: reveal-up 0.5s var(--ease-entrance) both; animation-delay: 0.2s; }
      .stagger-5 { animation: reveal-up 0.5s var(--ease-entrance) both; animation-delay: 0.25s; }
    </style>
  </head>
  <body data-theme="kiddy">
    <div id="root">
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a;color:#fff;font-family:system-ui,sans-serif;">
        <div style="width:40px;height:40px;border:2px solid rgba(255,255,255,0.2);border-top-color:#e6002b;border-radius:50%;animation:root-spin 0.8s linear infinite;"></div>
        <p style="margin-top:16px;font-size:14px;color:#a1a1aa;">Загрузка...</p>
      </div>
    </div>
    <style>@keyframes root-spin{to{transform:rotate(360deg);}}</style>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
